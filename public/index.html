<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>岚图洞察日报 - 生成系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                         "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p {
            color: #94a3b8;
            font-size: 14px;
        }

        .card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title .icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 6px;
            font-size: 14px;
        }

        .btn-generate {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-generate:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-generate.running {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
        }

        /* 进度区域 */
        .progress-section {
            display: none;
            margin-top: 24px;
        }

        .progress-section.active {
            display: block;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-label {
            font-size: 14px;
            color: #94a3b8;
        }

        .progress-percent {
            font-size: 14px;
            font-weight: 600;
            color: #60a5fa;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(51, 65, 85, 0.8);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 4px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .progress-fill.done {
            background: linear-gradient(90deg, #22c55e, #16a34a);
        }

        .progress-fill.error {
            background: linear-gradient(90deg, #ef4444, #dc2626);
        }

        .progress-step {
            font-size: 13px;
            color: #64748b;
            min-height: 20px;
        }

        /* 下载区域 */
        .download-section {
            display: none;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(71, 85, 105, 0.5);
        }

        .download-section.active {
            display: block;
        }

        .download-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding: 16px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 10px;
        }

        .download-info .check-icon {
            width: 32px;
            height: 32px;
            background: #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .download-info .info-text h4 {
            font-size: 14px;
            color: #22c55e;
            margin-bottom: 2px;
        }

        .download-info .info-text p {
            font-size: 12px;
            color: #94a3b8;
        }

        .btn-download {
            width: 100%;
            padding: 12px 24px;
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-download:hover {
            background: rgba(34, 197, 94, 0.25);
            border-color: rgba(34, 197, 94, 0.5);
        }

        /* 错误区域 */
        .error-section {
            display: none;
            margin-top: 24px;
            padding: 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
        }

        .error-section.active {
            display: block;
        }

        .error-section h4 {
            color: #ef4444;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .error-section p {
            color: #94a3b8;
            font-size: 13px;
            word-break: break-all;
        }

        /* 历史任务 */
        .history-list {
            list-style: none;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 10px;
            margin-bottom: 8px;
            transition: background 0.2s;
        }

        .history-item:hover {
            background: rgba(15, 23, 42, 0.8);
        }

        .history-item .task-info {
            flex: 1;
        }

        .history-item .task-id {
            font-size: 12px;
            color: #64748b;
            font-family: monospace;
        }

        .history-item .task-status {
            font-size: 13px;
            margin-top: 2px;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }

        .status-badge.done {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        .status-badge.running {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }

        .status-badge.pending {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        .status-badge.error {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .history-item .task-actions a {
            color: #60a5fa;
            text-decoration: none;
            font-size: 13px;
            margin-left: 12px;
        }

        .history-item .task-actions a:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 32px;
            color: #475569;
            font-size: 14px;
        }

        /* 加载动画 */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* 响应式 */
        @media (max-width: 640px) {
            .container {
                padding: 24px 16px;
            }
            .header h1 {
                font-size: 24px;
            }
            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>岚图洞察日报</h1>
            <p>AI 驱动的汽车行业洞察信息收集与日报生成系统</p>
        </div>

        <!-- 生成区域 -->
        <div class="card">
            <div class="card-title">
                <span class="icon">&#9889;</span>
                生成日报
            </div>
            <button class="btn-generate" id="btnGenerate" onclick="startGenerate()">
                开始生成今日日报
            </button>

            <!-- 进度 -->
            <div class="progress-section" id="progressSection">
                <div class="progress-header">
                    <span class="progress-label">生成进度</span>
                    <span class="progress-percent" id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-step" id="progressStep">准备中...</div>
            </div>

            <!-- 下载 -->
            <div class="download-section" id="downloadSection">
                <div class="download-info">
                    <div class="check-icon">&#10003;</div>
                    <div class="info-text">
                        <h4>日报生成完成</h4>
                        <p id="downloadInfo">共收录 0 条新闻</p>
                    </div>
                </div>
                <a class="btn-download" id="btnDownload" href="#" download>
                    &#128196; 下载 Markdown 文件
                </a>
            </div>

            <!-- 错误 -->
            <div class="error-section" id="errorSection">
                <h4>&#9888; 生成失败</h4>
                <p id="errorMessage"></p>
            </div>
        </div>

        <!-- 历史任务 -->
        <div class="card">
            <div class="card-title">
                <span class="icon">&#128203;</span>
                历史任务
            </div>
            <ul class="history-list" id="historyList">
                <li class="empty-state">暂无任务记录</li>
            </ul>
        </div>
    </div>

    <script>
        let currentTaskId = null;
        let pollTimer = null;

        async function startGenerate() {
            const btn = document.getElementById('btnGenerate');
            const progressSection = document.getElementById('progressSection');
            const downloadSection = document.getElementById('downloadSection');
            const errorSection = document.getElementById('errorSection');

            // 重置状态
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> 正在创建任务...';
            progressSection.classList.add('active');
            downloadSection.classList.remove('active');
            errorSection.classList.remove('active');
            updateProgress(0, '正在创建任务...');

            try {
                const resp = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({}),
                });
                const data = await resp.json();

                if (!data.success) {
                    throw new Error(data.error || '创建任务失败');
                }

                currentTaskId = data.task_id;
                btn.innerHTML = '<span class="spinner"></span> 日报生成中...';
                btn.classList.add('running');

                // 开始轮询
                pollStatus();

            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = '开始生成今日日报';
                progressSection.classList.remove('active');
                showError(err.message);
            }
        }

        async function pollStatus() {
            if (!currentTaskId) return;

            try {
                const resp = await fetch(`/api/status?task_id=${currentTaskId}`);
                const data = await resp.json();

                if (!data.success) {
                    showError(data.error);
                    resetButton();
                    return;
                }

                updateProgress(data.progress, data.step);

                if (data.status === 'done') {
                    // 生成完成
                    clearInterval(pollTimer);
                    pollTimer = null;
                    onTaskDone(data);
                } else if (data.status === 'error') {
                    clearInterval(pollTimer);
                    pollTimer = null;
                    showError(data.error || '生成过程中发生错误');
                    resetButton();
                } else {
                    // 继续轮询
                    if (!pollTimer) {
                        pollTimer = setInterval(pollStatus, 2000);
                    }
                }
            } catch (err) {
                // 网络错误，继续轮询
                console.error('轮询失败:', err);
            }
        }

        function updateProgress(percent, step) {
            const fill = document.getElementById('progressFill');
            const percentText = document.getElementById('progressPercent');
            const stepText = document.getElementById('progressStep');

            fill.style.width = percent + '%';
            percentText.textContent = percent + '%';
            stepText.textContent = step || '';
        }

        function onTaskDone(data) {
            const btn = document.getElementById('btnGenerate');
            const downloadSection = document.getElementById('downloadSection');
            const progressFill = document.getElementById('progressFill');

            progressFill.classList.add('done');
            btn.innerHTML = '&#10003; 日报已生成';
            btn.classList.remove('running');

            // 显示下载区域
            document.getElementById('downloadInfo').textContent =
                `共收录 ${data.article_count || 0} 条新闻`;
            document.getElementById('btnDownload').href =
                `/api/download?task_id=${currentTaskId}&format=md`;
            downloadSection.classList.add('active');

            // 刷新历史
            loadHistory();
        }

        function showError(message) {
            const errorSection = document.getElementById('errorSection');
            document.getElementById('errorMessage').textContent = message;
            errorSection.classList.add('active');

            const progressFill = document.getElementById('progressFill');
            progressFill.classList.add('error');
        }

        function resetButton() {
            const btn = document.getElementById('btnGenerate');
            btn.disabled = false;
            btn.innerHTML = '开始生成今日日报';
            btn.classList.remove('running');
        }

        async function loadHistory() {
            try {
                const resp = await fetch('/api/');
                const data = await resp.json();

                const list = document.getElementById('historyList');

                if (!data.tasks || data.tasks.length === 0) {
                    list.innerHTML = '<li class="empty-state">暂无任务记录</li>';
                    return;
                }

                list.innerHTML = data.tasks.map(task => {
                    const statusClass = task.status;
                    const statusText = {
                        'pending': '等待中',
                        'running': '进行中',
                        'done': '已完成',
                        'error': '失败',
                    }[task.status] || task.status;

                    const time = task.created_at
                        ? new Date(task.created_at).toLocaleString('zh-CN')
                        : '';

                    let actions = '';
                    if (task.status === 'done' && task.has_result) {
                        actions = `<a href="/api/download?task_id=${task.task_id}&format=md" download>下载</a>`;
                    }
                    if (task.status === 'running') {
                        actions = `<span style="color:#60a5fa;font-size:12px">${task.progress}%</span>`;
                    }

                    return `
                        <li class="history-item">
                            <div class="task-info">
                                <div class="task-id">${task.task_id.substring(0, 8)}... &middot; ${time}</div>
                                <div class="task-status">
                                    <span class="status-badge ${statusClass}">${statusText}</span>
                                    ${task.article_count ? ` &middot; ${task.article_count} 条新闻` : ''}
                                </div>
                            </div>
                            <div class="task-actions">${actions}</div>
                        </li>
                    `;
                }).join('');

            } catch (err) {
                console.error('加载历史失败:', err);
            }
        }

        // 页面加载时获取历史任务
        loadHistory();
    </script>
</body>
</html>

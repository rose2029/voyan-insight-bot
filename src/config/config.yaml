# ============================================================
# 岚图汽车 · 洞察信息收集日报 · 配置文件
# ============================================================

# DeepSeek API 配置
llm:
  api_key: "sk-7e580fa3f7f34f8da0593ab929fbf365"
  base_url: "https://api.deepseek.com/v1"
  model: "deepseek-chat"
  temperature: 0.3
  max_tokens: 2000
  # 请求超时（秒）
  timeout: 60
  # 请求间隔（秒），防止限流
  request_interval: 1

# 数据源配置
sources:
  # ============================================================
  # 数据源按五大渠道分类配置
  # 策略：官方源头优先 + 综合门户覆盖 + 垂直媒体深挖
  # ============================================================

  # --- 第一类：政府/政策/协会源头（对应国家/政策层）---
  rss:
    # 财经门户（综合覆盖）
    - name: "财联社电报"
      url: "https://www.cls.cn/telegraph"
      enabled: false
      rss_keyword_filter: ["新能源", "电动", "车企", "比亚迪", "特斯拉", "蔚来", "理想", "小鹏", "电池", "智驾", "汽车", "充电", "交付", "销量", "关税", "补贴", "政策"]
    - name: "36氪"
      url: "https://36kr.com/feed"
      enabled: true
      rss_keyword_filter: ["新能源", "电动", "车企", "比亚迪", "特斯拉", "蔚来", "理想", "小鹏", "问界", "岚图", "极氪", "腾势", "智驾", "电池", "充电", "交付", "销量", "汽车", "混动", "增程", "自动驾驶", "固态电池"]
    - name: "IT之家"
      url: "https://www.ithome.com/rss/"
      enabled: true
      rss_keyword_filter: ["新能源", "电动", "车企", "比亚迪", "特斯拉", "蔚来", "理想", "小鹏", "问界", "岚图", "极氪", "腾势", "智驾", "电池", "充电", "交付", "销量", "汽车", "混动", "增程", "自动驾驶", "固态电池", "e-tron"]

  # --- 第二类：汽车垂直行业媒体（对应业务/竞争层 + 技术/研发层）---
  web:
    - name: "第一电动网"
      url: "https://www.d1ev.com/news"
      enabled: true
      list_selector: ".news-list li a"
      title_selector: "h1"
      content_selector: ".content"
    - name: "汽车之家新能源"
      url: "https://newenergy.autohome.com.cn/news/"
      enabled: true
      list_selector: ".list-cont li a"
      title_selector: "h1"
      content_selector: ".article-content"
    - name: "懂车帝"
      url: "https://www.dongchedi.com/auto/news/"
      enabled: false
      list_selector: ".news-list a"
      title_selector: "h1"
      content_selector: ".article-content"
    - name: "太平洋汽车网"
      url: "https://www.pcauto.com.cn/news/"
      enabled: false
      list_selector: ".list-item a"
      title_selector: "h1"
      content_selector: ".article-content"

  # --- 第三类：政府/协会官网（对应国家/政策层）---
  government:
    - name: "工信部-装备工业一司"
      url: "https://www.miit.gov.cn/jgsj/zzgs/wjfb/index.html"
      enabled: true
      list_selector: ".list-item li a"
      title_selector: "h1"
      content_selector: ".article-content"
    - name: "乘联会"
      url: "http://www.cpcaauto.com/newslist.asp"
      enabled: false
      list_selector: ".news-list a"
      title_selector: "h1"
      content_selector: ".content"

  # --- 第四类：企业官方动态（对应业务/竞争层）---
  # 注：企业官网通常需要针对性配置选择器，建议通过手动URL方式补充
  # 可关注：岚图官网、比亚迪官网、理想官网、蔚来官网、小鹏官网、特斯拉官网

  # 手动输入源（用户粘贴URL，运行时通过 --urls 参数传入）
  manual_urls: []

# 抓取配置
fetch:
  # 抓取时间范围（小时），默认前24小时
  hours_range: 24
  # 每个源最大抓取文章数
  max_articles_per_source: 50
  # 请求超时（秒）
  timeout: 30
  # 请求间隔（秒）
  request_interval: 2
  # User-Agent
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  # 代理配置（可选）
  proxy: null

# 关键词配置（也可在 keywords.json 中编辑）
keywords:
  # 必收关键词 - 命中任一则保留
  must_include_file: "config/keywords.json"
  # 排除关键词 - 命中任一则过滤
  exclude_file: "config/keywords.json"

# 层面分类规则
# 注意：涉及具体公司/品牌的新闻优先归入业务/竞争层（代码中硬编码判断）
category_rules:
  "国家/政策层":
    keywords: ["发改委", "工信部", "国务院", "商务部", "财政部", "补贴", "关税", "双积分", "碳达峰", "碳中和", "标准", "规划", "政策", "法规", "条例", "管理办法", "征求意见", "通知", "公告", "管理办法", "回收利用", "溯源", "安全标准"]
  "行业/市场层":
    keywords: ["市场份额", "渗透率", "价格战", "行业报告", "行业分析", "行业趋势", "市场预测", "消费者", "出海趋势", "全球化", "进口", "出口数据", "充电桩", "充电网络", "基础设施", "行业寒冬", "市场承压"]
  "技术/研发层":
    keywords: ["电池", "电驱", "电控", "智能驾驶", "座舱", "芯片", "操作系统", "热效率", "固态", "钠离子", "大模型", "激光雷达", "800V", "快充", "换电", "CTP", "CTC", "一体化", "混动发动机", "超高压", "超充", "闪充", "ai技术", "fsd", "自动驾驶技术", "智能座舱", "主动安全"]
  "业务/竞争层":
    keywords: ["新车", "发布", "上市", "预售", "产能", "工厂", "人事", "战略合作", "融资", "收购", "合并", "裁员", "召回", "维权", "投诉", "经销商", "渠道", "交付", "销量", "大定", "订单", "代理", "经销商", "破产", "更名", "转型"]

# 输出配置
output:
  # 输出目录
  daily_dir: "output/daily"
  biweekly_dir: "output/biweekly"
  archive_dir: "output/archive"
  # 日报文件名模板
  daily_filename: "洞察信息收集日报_{date}.docx"
  # Markdown文件名模板
  daily_md_filename: "洞察信息收集日报_{date}.md"
  # 半月报文件名模板
  biweekly_filename: "洞察信息半月报_{start}_{end}.docx"
  biweekly_md_filename: "洞察信息半月报_{start}_{end}.md"
  # 日期格式
  date_format: "%Y%m%d"

# 定时调度
schedule:
  # 每日执行时间（HH:MM）
  daily_time: "07:00"
  # 半月报生成时间（每月1号和16号）
  biweekly_days: [1, 16]

# 通知配置（可选）
notification:
  # 企业微信Webhook（可选）
  wecom_webhook: null
  # 邮件通知（可选）
  email:
    enabled: false
    smtp_server: ""
    smtp_port: 465
    sender: ""
    password: ""
    receivers: []

# 日志配置
logging:
  level: "INFO"
  file: "logs/app.log"
  max_size: "10MB"
  backup_count: 5
